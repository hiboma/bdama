<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ビー玉ころころ - うちゅうたんけん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--space:#1a1a2e;--nebula:#6C3483;--star-y:#FFD700;--rocket:#FF5722;--cosmic:#2196F3;--light:#e8eaf6;--shadow:0 4px 16px rgba(0,0,0,0.3);--chunky:0 5px 0 rgba(0,0,0,0.4),0 7px 20px rgba(0,0,0,0.3)}
html,body{font-family:'DotGothic16',sans-serif;background:var(--space);color:#e8eaf6;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab-nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;background:rgba(26,26,46,0.95);backdrop-filter:blur(12px);border-bottom:2px solid var(--nebula);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 12px;font-family:inherit;font-size:11px;border:none;background:none;color:#9e9ec0;cursor:pointer;white-space:nowrap;position:relative}
.tab-btn.active{color:var(--star-y)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--star-y);border-radius:2px 2px 0 0}
.screen{display:none;min-height:100vh;min-height:100dvh;padding-top:44px}
.screen.active{display:flex;flex-direction:column}

.space-bg{background:linear-gradient(180deg,#0d0d1a 0%,#1a1a2e 30%,#16213e 60%,#1a1a2e 100%);position:relative;overflow:hidden}
/* twinkling stars */
.twinkle{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twink var(--dur,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twink{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

.title-screen{align-items:center;justify-content:center;gap:28px}
.title-marble-wrap{width:110px;height:110px;animation:bounce 2s ease-in-out infinite;position:relative}
.title-marble-wrap::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:70px;height:14px;background:radial-gradient(ellipse,rgba(255,215,0,0.15) 0%,transparent 70%);border-radius:50%;animation:shadp 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-36px)}50%{transform:translateY(0)}60%{transform:translateY(-10px)}75%{transform:translateY(0)}}
@keyframes shadp{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.6}30%{transform:translateX(-50%) scaleX(.5);opacity:.2}}

.marble-gold{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.9) 0%,transparent 40%),radial-gradient(circle at 65% 70%,rgba(255,160,0,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#FFD54F 0%,#FFB300 40%,#FF8F00 70%,#E65100 100%);box-shadow:inset -6px -6px 16px rgba(0,0,0,0.2),inset 3px 3px 8px rgba(255,255,255,0.3),0 0 30px rgba(255,215,0,0.4),0 6px 24px rgba(255,143,0,0.35);position:relative}
.marble-gold::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(2px)}

.title-text h1{font-size:32px;text-align:center;color:var(--star-y);text-shadow:0 0 20px rgba(255,215,0,0.5);line-height:1.3}
.title-text p{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-top:4px}
.play-btn{font-family:inherit;font-size:24px;color:#fff;background:linear-gradient(135deg,var(--rocket),#D84315);border:none;border-radius:50px;padding:16px 56px;box-shadow:0 0 20px rgba(255,87,34,0.4),var(--chunky);cursor:pointer;letter-spacing:3px}
.play-btn:active{transform:translateY(3px);box-shadow:0 0 10px rgba(255,87,34,0.3)}

.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0}
.level-badge{background:rgba(255,255,255,0.1);border-radius:20px;padding:5px 16px;font-size:15px;box-shadow:var(--shadow);color:var(--star-y);border:1px solid rgba(255,215,0,0.2)}
.stars{display:flex;gap:3px}
.star svg{width:26px;height:26px}
.star-empty{fill:rgba(255,255,255,0.15)}
.star-filled{fill:#FFD700;filter:drop-shadow(0 0 6px rgba(255,215,0,0.6))}

.game-area{flex:1;margin:6px 14px;background:rgba(255,255,255,0.05);border-radius:22px;box-shadow:inset 0 0 0 2px rgba(255,255,255,0.08);position:relative;overflow:hidden;min-height:0;backdrop-filter:blur(4px)}
.game-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:22px 22px}

/* UFO goal */
.goal-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center}
.ufo{width:70px;height:36px;margin:0 auto;position:relative}
.ufo-dome{width:30px;height:20px;background:rgba(33,150,243,0.6);border-radius:50% 50% 0 0;margin:0 auto;border:2px solid rgba(33,150,243,0.8)}
.ufo-body{width:70px;height:14px;background:linear-gradient(135deg,#78909C,#546E7A);border-radius:50%;margin-top:-4px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:1px solid #90A4AE}
.ufo-beam{width:40px;height:30px;background:linear-gradient(180deg,rgba(255,215,0,0.3) 0%,rgba(255,215,0,0) 100%);margin:0 auto;clip-path:polygon(20% 0%,80% 0%,100% 100%,0% 100%);animation:beampulse 2s ease-in-out infinite}
@keyframes beampulse{0%,100%{opacity:.5}50%{opacity:1}}
.goal-label{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;letter-spacing:2px}

.start-zone{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);text-align:center}
.start-platform{width:76px;height:18px;background:linear-gradient(135deg,var(--cosmic),#1976D2);border-radius:12px;margin:0 auto;box-shadow:0 3px 0 #0D47A1,0 0 12px rgba(33,150,243,0.3)}
.start-label{font-size:10px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:2px}

.gm{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.9) 0%,transparent 40%),radial-gradient(circle at 65% 70%,rgba(255,160,0,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#FFD54F 0%,#FFB300 40%,#FF8F00 70%,#E65100 100%);box-shadow:inset -3px -3px 8px rgba(0,0,0,0.2),inset 2px 2px 4px rgba(255,255,255,0.3),0 0 16px rgba(255,215,0,0.3),0 3px 10px rgba(255,143,0,0.3);position:absolute;z-index:10}
.gm::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(1px)}

.drawn-path{position:absolute;inset:0;z-index:5}
.drawn-path svg{width:100%;height:100%}
.path-line{fill:none;stroke:rgba(33,150,243,0.5);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(33,150,243,0.4))}
.path-border{fill:none;stroke:rgba(33,150,243,0.2);stroke-width:18;stroke-linecap:round;stroke-linejoin:round}

/* asteroid obstacles */
.asteroid{position:absolute;z-index:8;border-radius:40% 50% 45% 55%;background:linear-gradient(135deg,#78909C,#546E7A);box-shadow:inset -3px -3px 6px rgba(0,0,0,0.3),0 2px 8px rgba(0,0,0,0.3);border:2px solid #607D8B}
/* alien enemy */
.alien{position:absolute;z-index:9;animation:alienfloat 2s ease-in-out infinite}
@keyframes alienfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.alien-body{width:34px;height:30px;background:linear-gradient(135deg,#66BB6A,#43A047);border-radius:50% 50% 40% 40%;position:relative;box-shadow:0 0 12px rgba(76,175,80,0.3)}
.alien-eyes{position:absolute;top:30%;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.alien-eye{width:10px;height:12px;background:#000;border-radius:50%;border:2px solid #E8F5E9;position:relative}
.alien-eye::after{content:'';position:absolute;top:2px;left:2px;width:4px;height:4px;background:#E8F5E9;border-radius:50%}
.alien-antenna{position:absolute;top:-10px;width:2px;height:12px;background:#66BB6A}
.alien-antenna:first-child{left:30%;transform:rotate(-15deg)}
.alien-antenna:last-child{right:30%;transform:rotate(15deg)}
.alien-antenna::after{content:'';position:absolute;top:-4px;left:-2px;width:6px;height:6px;background:#A5D6A7;border-radius:50%;animation:twink 1.5s ease-in-out infinite}
.alien-mouth{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:8px;height:4px;border:2px solid #E8F5E9;border-top:none;border-radius:0 0 6px 6px}
.alien-label{font-size:8px;text-align:center;color:#66BB6A;margin-top:3px}

/* mothership boss */
.mothership{position:absolute;z-index:9;animation:motherhover 2s ease-in-out infinite}
@keyframes motherhover{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.mothership-body{width:90px;height:35px;background:linear-gradient(135deg,#37474F,#263238);border-radius:50%;position:relative;box-shadow:0 0 20px rgba(76,175,80,0.3),0 4px 12px rgba(0,0,0,0.4);border:2px solid #455A64}
.mothership-dome{width:36px;height:18px;background:rgba(76,175,80,0.3);border-radius:50% 50% 0 0;position:absolute;top:-12px;left:50%;transform:translateX(-50%);border:2px solid rgba(76,175,80,0.5)}
.mothership-lights{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.mothership-light{width:6px;height:6px;border-radius:50%;animation:mlight 1s ease-in-out infinite}
.mothership-light:nth-child(1){background:var(--rocket);animation-delay:0s}
.mothership-light:nth-child(2){background:var(--star-y);animation-delay:.2s}
.mothership-light:nth-child(3){background:var(--cosmic);animation-delay:.4s}
.mothership-light:nth-child(4){background:#66BB6A;animation-delay:.6s}
@keyframes mlight{0%,100%{opacity:.3}50%{opacity:1}}

/* gravity well */
.gravity-well{position:absolute;z-index:6;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,rgba(108,52,131,0.5) 0%,transparent 70%);border:2px solid rgba(108,52,131,0.3);animation:gwpulse 2s ease-in-out infinite}
@keyframes gwpulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}

/* wormhole */
.wormhole{position:absolute;z-index:8;width:40px;height:40px;border-radius:50%;border:3px solid rgba(108,52,131,0.5);animation:spin 3s linear infinite}
.wormhole::before{content:'';position:absolute;inset:5px;border-radius:50%;border:2px solid rgba(108,52,131,0.3)}
.wormhole::after{content:'';position:absolute;inset:10px;border-radius:50%;background:rgba(108,52,131,0.2)}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* countdown */
.countdown{position:absolute;top:8px;right:8px;background:rgba(255,87,34,0.2);border:1px solid rgba(255,87,34,0.4);border-radius:12px;padding:4px 10px;font-size:12px;color:var(--rocket);animation:hpulse 1s ease-in-out infinite;z-index:15}
@keyframes hpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}

.hint-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:rgba(255,255,255,0.2);pointer-events:none;text-align:center;line-height:1.8;z-index:1}
.finger-dot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid rgba(33,150,243,0.4);background:rgba(33,150,243,0.1);z-index:20;animation:fpulse 1.5s ease-in-out infinite}
@keyframes fpulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:.3}}
.game-footer{padding:10px 16px 22px;display:flex;justify-content:center;flex-shrink:0}
.reset-btn{font-family:inherit;font-size:15px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:10px 28px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.3)}
.reset-btn:active{transform:translateY(2px)}

.clear-screen{align-items:center;justify-content:center;gap:22px}
.clear-text{font-size:48px;color:var(--star-y);text-shadow:0 0 30px rgba(255,215,0,0.5);letter-spacing:5px}
.clear-stars{display:flex;gap:10px}
.clear-star{width:52px;height:52px;animation:starspin 1.5s ease-in-out infinite}
.clear-star:nth-child(2){animation-delay:.15s}
.clear-star:nth-child(3){animation-delay:.3s}
@keyframes starspin{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(10deg) scale(1.1)}75%{transform:rotate(-10deg) scale(1.05)}}
.clear-star svg{width:100%;height:100%;filter:drop-shadow(0 0 12px rgba(255,215,0,0.6))}
.clear-msg{font-size:16px;color:rgba(255,255,255,0.6)}
.clear-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.next-btn{font-family:inherit;font-size:20px;color:#fff;background:linear-gradient(135deg,var(--cosmic),#1565C0);border:none;border-radius:18px;padding:14px 0;box-shadow:0 0 16px rgba(33,150,243,0.3),0 4px 0 #0D47A1;cursor:pointer;letter-spacing:3px}
.next-btn:active{transform:translateY(3px)}
.retry-btn{font-family:inherit;font-size:14px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px 0;cursor:pointer}
.retry-btn:active{transform:translateY(2px)}
.sparkle{position:absolute;width:8px;height:8px;border-radius:50%;animation:sp var(--dur,2s) ease-in-out infinite var(--delay,0s)}
@keyframes sp{0%,100%{opacity:0;transform:scale(0)}20%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<nav class="tab-nav">
  <button class="tab-btn active" data-screen="title">タイトル</button>
  <button class="tab-btn" data-screen="lv1">Lv.1</button>
  <button class="tab-btn" data-screen="lv5">Lv.5</button>
  <button class="tab-btn" data-screen="lv10">Lv.10</button>
  <button class="tab-btn" data-screen="lv15">Lv.15</button>
  <button class="tab-btn" data-screen="lv20">Lv.20</button>
  <button class="tab-btn" data-screen="clear">クリア</button>
</nav>

<section class="screen title-screen space-bg active" id="screen-title">
  <div class="twinkle" style="top:8%;left:12%;--dur:3s;--delay:0s"></div>
  <div class="twinkle" style="top:15%;left:45%;--dur:4s;--delay:.5s"></div>
  <div class="twinkle" style="top:22%;right:15%;--dur:2.5s;--delay:1s"></div>
  <div class="twinkle" style="top:40%;left:8%;--dur:3.5s;--delay:.3s"></div>
  <div class="twinkle" style="top:50%;right:20%;--dur:5s;--delay:.8s"></div>
  <div class="twinkle" style="top:65%;left:30%;--dur:2.8s;--delay:1.5s"></div>
  <div class="twinkle" style="top:75%;right:10%;--dur:4.2s;--delay:.2s"></div>
  <div class="twinkle" style="bottom:15%;left:18%;--dur:3.2s;--delay:.7s"></div>
  <div class="twinkle" style="bottom:20%;right:35%;--dur:2s;--delay:1.2s"></div>
  <div class="title-marble-wrap"><div class="marble-gold"></div></div>
  <div class="title-text"><h1>ビー玉<br>ころころ</h1><p>うちゅうを たんけん しよう！</p></div>
  <button class="play-btn">あそぶ</button>
</section>

<section class="screen game-screen space-bg" id="screen-lv1">
  <div class="twinkle" style="top:20%;left:10%;--dur:3s"></div><div class="twinkle" style="top:40%;right:15%;--dur:4s;--delay:.5s"></div><div class="twinkle" style="top:60%;left:40%;--dur:2.5s;--delay:1s"></div>
  <div class="game-header"><div class="level-badge">レベル 1</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="ufo"><div class="ufo-dome"></div><div class="ufo-body"></div><div class="ufo-beam"></div></div><div class="goal-label">ゴール</div></div>
    <div class="hint-label">ゆびで なぞって<br>みちを つくろう</div>
    <div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/><path class="path-line" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/></svg></div>
    <div class="finger-dot" style="bottom:22%;left:42%"></div>
    <div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div>
    <div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div>
  </div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen space-bg" id="screen-lv5">
  <div class="twinkle" style="top:20%;left:10%;--dur:3s"></div><div class="twinkle" style="top:50%;right:15%;--dur:4s;--delay:.5s"></div>
  <div class="game-header"><div class="level-badge">レベル 5</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="ufo"><div class="ufo-dome"></div><div class="ufo-body"></div><div class="ufo-beam"></div></div><div class="goal-label">ゴール</div></div>
    <div class="asteroid" style="top:30%;left:8%;width:75px;height:28px"></div>
    <div class="asteroid" style="top:50%;right:8%;width:85px;height:26px"></div>
    <div class="asteroid" style="top:38%;left:52%;width:16px;height:55px"></div>
    <div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/><path class="path-line" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/></svg></div>
    <div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div>
    <div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div>
  </div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen space-bg" id="screen-lv10">
  <div class="twinkle" style="top:25%;left:8%;--dur:3s"></div><div class="twinkle" style="top:60%;right:12%;--dur:4s;--delay:.5s"></div>
  <div class="game-header"><div class="level-badge">レベル 10</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="ufo"><div class="ufo-dome"></div><div class="ufo-body"></div><div class="ufo-beam"></div></div><div class="goal-label">ゴール</div></div>
    <div class="asteroid" style="top:22%;left:5%;width:55px;height:22px"></div>
    <div class="asteroid" style="top:22%;right:5%;width:55px;height:22px"></div>
    <div class="asteroid" style="top:68%;left:28%;width:90px;height:22px"></div>
