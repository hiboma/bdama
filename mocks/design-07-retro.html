<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ビー玉ころころ - レトロゲーム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--green:#00E676;--blue:#42A5F5;--red:#EF5350;--yellow:#FFEE58;--shadow:0 0 16px rgba(0,230,118,0.2)}
html,body{font-family:'DotGothic16',sans-serif;background:var(--bg);color:#e0e0e0;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:9999}
.tab-nav{position:fixed;top:0;left:0;right:0;z-index:10000;display:flex;background:rgba(15,15,15,0.95);border-bottom:2px solid var(--green);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 12px;font-family:inherit;font-size:11px;border:none;background:none;color:#666;cursor:pointer;white-space:nowrap;position:relative}
.tab-btn.active{color:var(--green);text-shadow:0 0 8px var(--green)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--green);box-shadow:0 0 6px var(--green)}
.screen{display:none;min-height:100vh;min-height:100dvh;padding-top:44px}
.screen.active{display:flex;flex-direction:column}
.retro-bg{background:linear-gradient(180deg,#0a0a18 0%,#0f0f0f 50%,#0a0a18 100%);position:relative;overflow:hidden}

.title-screen{align-items:center;justify-content:center;gap:28px}
.title-marble-wrap{width:110px;height:110px;animation:bounce 2s ease-in-out infinite;position:relative}
.title-marble-wrap::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:70px;height:14px;background:radial-gradient(ellipse,rgba(0,230,118,0.15) 0%,transparent 70%);border-radius:50%}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-36px)}50%{transform:translateY(0)}60%{transform:translateY(-10px)}75%{transform:translateY(0)}}
.marble-neon{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.8) 0%,transparent 35%),radial-gradient(circle at 65% 70%,rgba(0,200,100,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#69F0AE 0%,#00E676 40%,#00C853 70%,#00AA44 100%);box-shadow:inset -6px -6px 16px rgba(0,0,0,0.2),inset 3px 3px 8px rgba(255,255,255,0.2),0 0 40px rgba(0,230,118,0.4),0 6px 24px rgba(0,200,80,0.3);position:relative}
.marble-neon::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.6);border-radius:50%;transform:rotate(-30deg);filter:blur(2px)}

.title-text h1{font-size:32px;text-align:center;color:var(--green);text-shadow:0 0 20px var(--green);line-height:1.3}
.title-text p{font-size:13px;color:#666;text-align:center;margin-top:4px}
.play-btn{font-family:inherit;font-size:24px;color:#000;background:var(--green);border:none;border-radius:50px;padding:16px 56px;box-shadow:0 0 20px rgba(0,230,118,0.4),0 5px 0 #00AA44;cursor:pointer;letter-spacing:3px}
.play-btn:active{transform:translateY(3px);box-shadow:0 0 10px rgba(0,230,118,0.3)}
/* blinking cursor */
.blink{display:inline-block;width:12px;height:3px;background:var(--green);animation:blk .8s step-end infinite;vertical-align:middle;margin-left:4px}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0}}

.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0}
.level-badge{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:20px;padding:5px 16px;font-size:15px;color:var(--green);text-shadow:0 0 6px var(--green)}
.stars{display:flex;gap:3px}
.star svg{width:26px;height:26px}
.star-empty{fill:rgba(255,255,255,0.1)}
.star-filled{fill:var(--yellow);filter:drop-shadow(0 0 6px var(--yellow))}

.game-area{flex:1;margin:6px 14px;background:rgba(255,255,255,0.03);border-radius:22px;border:2px solid rgba(0,230,118,0.1);position:relative;overflow:hidden;min-height:0}
.game-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,230,118,0.03) 1px,transparent 1px);background-size:22px 22px}

/* treasure chest goal */
.goal-zone{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center}
.chest{width:50px;height:36px;margin:0 auto;position:relative}
.chest-body{width:50px;height:24px;background:linear-gradient(180deg,#8D6E63,#6D4C41);border-radius:4px;position:absolute;bottom:0;border:2px solid #A1887F}
.chest-lid{width:54px;height:14px;background:linear-gradient(180deg,#A1887F,#8D6E63);border-radius:6px 6px 0 0;position:absolute;top:0;left:-2px;border:2px solid #A1887F}
.chest-lock{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:var(--yellow);border-radius:2px;box-shadow:0 0 6px rgba(255,238,88,0.5)}
.chest-glow{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:30px;height:6px;background:var(--yellow);border-radius:50%;opacity:.4;animation:chestglow 1.5s ease-in-out infinite;filter:blur(4px)}
@keyframes chestglow{0%,100%{opacity:.2}50%{opacity:.6}}
.goal-label{font-size:10px;color:#666;margin-top:4px;letter-spacing:2px}

.start-zone{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);text-align:center}
.start-platform{width:76px;height:18px;background:linear-gradient(135deg,var(--blue),#1E88E5);border-radius:12px;margin:0 auto;box-shadow:0 3px 0 #1565C0,0 0 12px rgba(66,165,245,0.3)}
.start-label{font-size:10px;color:#666;margin-top:6px;letter-spacing:2px}

.gm{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.8) 0%,transparent 35%),radial-gradient(circle at 65% 70%,rgba(0,200,100,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#69F0AE 0%,#00E676 40%,#00C853 70%,#00AA44 100%);box-shadow:inset -3px -3px 8px rgba(0,0,0,0.2),0 0 20px rgba(0,230,118,0.3),0 3px 10px rgba(0,200,80,0.3);position:absolute;z-index:10}
.gm::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.6);border-radius:50%;transform:rotate(-30deg);filter:blur(1px)}

.drawn-path{position:absolute;inset:0;z-index:5}
.drawn-path svg{width:100%;height:100%}
.path-line{fill:none;stroke:var(--blue);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;opacity:.4;filter:drop-shadow(0 0 6px rgba(66,165,245,0.4))}
.path-border{fill:none;stroke:rgba(66,165,245,0.15);stroke-width:18;stroke-linecap:round;stroke-linejoin:round}

/* brick obstacles */
.brick{position:absolute;z-index:8;border-radius:6px;background:linear-gradient(135deg,#424242,#333);box-shadow:0 2px 0 #222,0 0 8px rgba(255,255,255,0.05);border:2px solid #555}
/* ghost enemy */
.ghost{position:absolute;z-index:9;animation:ghostfloat 2s ease-in-out infinite}
@keyframes ghostfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ghost-body{width:34px;height:36px;background:linear-gradient(180deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));border-radius:50% 50% 0 0;position:relative;box-shadow:0 0 12px rgba(255,255,255,0.1)}
.ghost-body::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:8px;background:inherit;clip-path:polygon(0% 0%,20% 100%,40% 0%,60% 100%,80% 0%,100% 100%,100% 0%,0% 0%)}
.ghost-eyes{position:absolute;top:30%;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.ghost-eye{width:8px;height:8px;background:#fff;border-radius:50%;position:relative}
.ghost-eye::after{content:'';position:absolute;bottom:1px;left:3px;width:4px;height:4px;background:var(--blue);border-radius:50%}
.ghost-label{font-size:8px;text-align:center;color:#666;margin-top:4px}

/* dragon boss */
.dragon-boss{position:absolute;z-index:9;animation:dboss 1.5s ease-in-out infinite}
@keyframes dboss{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.03)}}
.dragon-boss-body{width:70px;height:55px;background:linear-gradient(135deg,var(--red),#C62828);border-radius:40% 40% 50% 50%;position:relative;box-shadow:0 0 20px rgba(239,83,80,0.3),0 4px 0 #B71C1C}
.dragon-boss-eyes{position:absolute;top:25%;left:50%;transform:translateX(-50%);display:flex;gap:14px}
.dragon-boss-eye{width:12px;height:10px;background:var(--yellow);border-radius:50%;position:relative}
.dragon-boss-eye::after{content:'';position:absolute;top:2px;left:4px;width:5px;height:6px;background:#1a1a1a;border-radius:50%}
.dragon-boss-mouth{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:18px;height:8px;border:3px solid var(--yellow);border-top:none;border-radius:0 0 10px 10px}
/* fire particles */
.fire{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.fire-p{width:6px;height:10px;background:var(--red);border-radius:50% 50% 0 0;animation:fireflick var(--d,.6s) ease-in-out infinite var(--dl,0s);opacity:.7}
@keyframes fireflick{0%,100%{transform:scaleY(1);opacity:.7}50%{transform:scaleY(1.5);opacity:1}}
/* health bar */
.hp-bar{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:50px;height:6px;background:#333;border-radius:3px;border:1px solid #555}
.hp-fill{width:70%;height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));border-radius:3px}
.danger{position:absolute;top:8px;right:8px;background:rgba(239,83,80,0.2);border:1px solid rgba(239,83,80,0.4);border-radius:8px;padding:3px 8px;font-size:10px;color:var(--red);animation:dangerblink .5s step-end infinite;z-index:15;text-shadow:0 0 4px var(--red)}
@keyframes dangerblink{0%,100%{opacity:1}50%{opacity:.3}}

.hint-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:#444;pointer-events:none;text-align:center;line-height:1.8;z-index:1}
.finger-dot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid rgba(66,165,245,0.3);background:rgba(66,165,245,0.1);z-index:20;animation:fpulse 1.5s ease-in-out infinite}
@keyframes fpulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:.3}}
.game-footer{padding:10px 16px 22px;display:flex;justify-content:center;flex-shrink:0}
.reset-btn{font-family:inherit;font-size:14px;color:#888;background:rgba(255,255,255,0.05);border:2px solid #333;border-radius:14px;padding:10px 28px;cursor:pointer;box-shadow:0 2px 0 #222}
.reset-btn:active{transform:translateY(2px)}

.clear-screen{align-items:center;justify-content:center;gap:22px}
.clear-text{font-size:48px;color:var(--green);text-shadow:0 0 30px var(--green);letter-spacing:5px}
.clear-stars{display:flex;gap:10px}
.clear-star{width:52px;height:52px;animation:starspin 1.5s ease-in-out infinite}
.clear-star:nth-child(2){animation-delay:.15s}
.clear-star:nth-child(3){animation-delay:.3s}
@keyframes starspin{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(10deg) scale(1.1)}75%{transform:rotate(-10deg) scale(1.05)}}
.clear-star svg{width:100%;height:100%;filter:drop-shadow(0 0 12px var(--yellow))}
.clear-msg{font-size:16px;color:#666}
.clear-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.next-btn{font-family:inherit;font-size:20px;color:#000;background:var(--green);border:none;border-radius:18px;padding:14px 0;box-shadow:0 0 16px rgba(0,230,118,0.3),0 4px 0 #00AA44;cursor:pointer;letter-spacing:3px}
.next-btn:active{transform:translateY(3px)}
.retry-btn{font-family:inherit;font-size:14px;color:#888;background:rgba(255,255,255,0.05);border:2px solid #333;border-radius:14px;padding:12px 0;cursor:pointer}
.retry-btn:active{transform:translateY(2px)}
</style>
</head>
<body>
<nav class="tab-nav">
  <button class="tab-btn active" data-screen="title">タイトル</button>
  <button class="tab-btn" data-screen="lv1">Lv.1</button>
  <button class="tab-btn" data-screen="lv5">Lv.5</button>
  <button class="tab-btn" data-screen="lv10">Lv.10</button>
  <button class="tab-btn" data-screen="lv15">Lv.15</button>
  <button class="tab-btn" data-screen="lv20">Lv.20</button>
  <button class="tab-btn" data-screen="clear">クリア</button>
</nav>

  <div class="title-text"><h1>ビー玉<br>ころころ</h1><p>PRESS START<span class="blink"></span></p></div>

  <div class="game-header"><div class="level-badge">LEVEL 5</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>

<section class="screen game-screen retro-bg" id="screen-lv10">
  <div class="game-header"><div class="level-badge">LEVEL 10</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="chest"><div class="chest-lid"></div><div class="chest-body"><div class="chest-lock"></div></div><div class="chest-glow"></div></div><div class="goal-label">GOAL</div></div>

    <div style="position:absolute;top:40%;left:12%;z-index:8;animation:omove 3s ease-in-out infinite"><div class="brick" style="position:relative;width:40px;height:18px;box-shadow:0 2px 0 #222,0 0 8px rgba(66,165,245,0.2)"></div></div>

@keyframes omove{0%,100%{transform:translateX(0)}50%{transform:translateX(50px)}}

<section class="screen game-screen retro-bg" id="screen-lv15">
  <div class="game-header"><div class="level-badge">LEVEL 15</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="chest"><div class="chest-lid"></div><div class="chest-body"><div class="chest-lock"></div></div><div class="chest-glow"></div></div><div class="goal-label">GOAL</div></div>
    <div class="brick" style="top:18%;left:0;width:38%;height:8px"></div>
    <div class="brick" style="top:18%;right:0;width:28%;height:8px"></div>
    <div class="brick" style="top:35%;left:18%;width:8px;height:60px"></div>
    <div class="brick" style="top:32%;right:22%;width:8px;height:60px"></div>
    <div class="brick" style="top:58%;left:0;width:32%;height:8px"></div>
    <div class="brick" style="top:58%;right:0;width:32%;height:8px"></div>
