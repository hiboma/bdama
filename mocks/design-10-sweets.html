<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ビー玉ころころ - おかしのくに</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--choco:#5D4037;--strawberry:#E91E63;--cream:#FFF9C4;--mint:#A5D6A7;--caramel:#FFB74D;--dark:#3e2a1a;--shadow:0 4px 16px rgba(93,64,55,0.12)}
html,body{font-family:'Yusei Magic',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab-nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;background:rgba(255,249,196,0.92);backdrop-filter:blur(12px);border-bottom:3px solid var(--caramel);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 12px;font-family:inherit;font-size:11px;border:none;background:none;color:var(--dark);cursor:pointer;white-space:nowrap;position:relative}
.tab-btn.active{color:var(--strawberry)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:3px;background:var(--strawberry);border-radius:3px 3px 0 0}
.screen{display:none;min-height:100vh;min-height:100dvh;padding-top:44px}
.screen.active{display:flex;flex-direction:column}
.sweets-bg{
  background:
    radial-gradient(circle,rgba(93,64,55,0.03) 1px,transparent 1px),
    linear-gradient(180deg,var(--cream) 0%,#FFF8E1 40%,#FFE0B2 70%,var(--cream) 100%);
  background-size:12px 12px,100% 100%;
  position:relative;overflow:hidden;
}

.title-screen{align-items:center;justify-content:center;gap:28px}
.title-marble-wrap{width:110px;height:110px;animation:bounce 2s ease-in-out infinite;position:relative}
.title-marble-wrap::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:70px;height:14px;background:radial-gradient(ellipse,rgba(93,64,55,0.12) 0%,transparent 70%);border-radius:50%}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-36px)}50%{transform:translateY(0)}60%{transform:translateY(-10px)}75%{transform:translateY(0)}}
.marble-caramel{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.85) 0%,transparent 35%),radial-gradient(circle at 65% 70%,rgba(200,150,50,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#FFE082 0%,var(--caramel) 40%,#F57C00 70%,#E65100 100%);box-shadow:inset -6px -6px 16px rgba(0,0,0,0.12),inset 3px 3px 8px rgba(255,255,255,0.3),0 6px 24px rgba(245,124,0,0.25);position:relative}
.marble-caramel::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(2px)}

.title-text h1{font-size:32px;text-align:center;color:var(--choco);line-height:1.3}
.title-text p{font-size:13px;color:var(--dark);opacity:.5;text-align:center;margin-top:4px}
.play-btn{font-family:inherit;font-size:24px;color:#fff;background:linear-gradient(135deg,var(--strawberry),#C2185B);border:none;border-radius:50px;padding:16px 56px;box-shadow:0 5px 0 #AD1457,0 7px 20px rgba(173,20,87,0.2);cursor:pointer;letter-spacing:3px}
.play-btn:active{transform:translateY(3px)}

.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0}
.level-badge{background:#fff;border-radius:20px;padding:5px 16px;font-size:14px;box-shadow:var(--shadow);color:var(--dark)}
.stars{display:flex;gap:3px}
.star svg{width:26px;height:26px}
.star-empty{fill:#ffe0b2}
.star-filled{fill:#FFD93D;filter:drop-shadow(0 1px 2px rgba(255,200,0,0.4))}
.game-area{flex:1;margin:6px 14px;background:#fff;border-radius:22px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:0}
.game-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(93,64,55,0.03) 1px,transparent 1px);background-size:20px 20px}
/* choco drip on top */
.game-area::after{content:'';position:absolute;top:0;left:0;right:0;height:12px;background:linear-gradient(180deg,var(--choco) 0%,transparent 100%);border-radius:22px 22px 0 0;opacity:.15}

/* birthday cake goal */
.goal-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center}
.cake{width:50px;height:44px;margin:0 auto;position:relative}
.cake-base{width:50px;height:22px;background:linear-gradient(180deg,#FFCC80,var(--caramel));border-radius:4px 4px 8px 8px;position:absolute;bottom:0;border:2px solid #F57C00}
.cake-frosting{width:54px;height:8px;background:linear-gradient(180deg,var(--strawberry),#C2185B);border-radius:4px;position:absolute;bottom:20px;left:-2px}
.cake-top{width:46px;height:14px;background:linear-gradient(180deg,#FFCC80,var(--caramel));border-radius:4px 4px 0 0;position:absolute;bottom:26px;left:2px;border:2px solid #F57C00;border-bottom:none}
.cake-candle{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:4px;height:12px;background:var(--mint);border-radius:2px}
.cake-flame{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:6px;height:8px;background:radial-gradient(ellipse,#FFD54F 0%,#FF6F00 100%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flicker .3s ease-in-out infinite alternate}
@keyframes flicker{0%{transform:translateX(-50%) scaleY(1)}100%{transform:translateX(-50%) scaleY(1.2)}}
.goal-label{font-size:10px;color:var(--dark);margin-top:4px;opacity:.5;letter-spacing:2px}

.start-zone{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);text-align:center}
.start-platform{width:76px;height:18px;background:linear-gradient(135deg,var(--mint),#66BB6A);border-radius:12px;margin:0 auto;box-shadow:0 3px 0 #388E3C}
.start-label{font-size:10px;color:var(--dark);margin-top:6px;opacity:.5;letter-spacing:2px}

.gm{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.85) 0%,transparent 35%),radial-gradient(circle at 65% 70%,rgba(200,150,50,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#FFE082 0%,var(--caramel) 40%,#F57C00 70%,#E65100 100%);box-shadow:inset -3px -3px 8px rgba(0,0,0,0.12),0 3px 10px rgba(245,124,0,0.25);position:absolute;z-index:10}
.gm::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(1px)}

.drawn-path{position:absolute;inset:0;z-index:5}
.drawn-path svg{width:100%;height:100%}
.path-line{fill:none;stroke:var(--caramel);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;opacity:.5}
.path-border{fill:none;stroke:rgba(255,183,77,0.2);stroke-width:18;stroke-linecap:round;stroke-linejoin:round}

/* chocolate block */
.choco-block{position:absolute;z-index:8;border-radius:4px;background:linear-gradient(135deg,#6D4C41,var(--choco));box-shadow:0 3px 0 #3E2723;border:2px solid #4E342E}
.choco-block::before{content:'';position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.08);border-radius:2px}
/* cookie wall */
.cookie{position:absolute;z-index:8;border-radius:10px;background:linear-gradient(135deg,#FFE082,#FFD54F);box-shadow:0 3px 0 #FFC107;border:2px solid #FFC107}
.cookie::before{content:'';position:absolute;top:25%;left:20%;width:4px;height:4px;background:var(--choco);border-radius:50%;box-shadow:12px 0 0 var(--choco),6px 8px 0 var(--choco)}

/* gummy bear enemy */
.gummy{position:absolute;z-index:9;animation:gummywob 1.5s ease-in-out infinite}
@keyframes gummywob{0%,100%{transform:scaleX(1) scaleY(1)}25%{transform:scaleX(1.1) scaleY(0.9)}50%{transform:scaleX(0.9) scaleY(1.1)}75%{transform:scaleX(1.05) scaleY(0.95)}}
.gummy-body{width:30px;height:32px;background:linear-gradient(135deg,var(--strawberry),#C2185B);border-radius:40% 40% 50% 50%;position:relative;box-shadow:0 2px 6px rgba(194,24,91,0.2);opacity:.85}
.gummy-ears{position:absolute;top:-4px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.gummy-ear{width:8px;height:8px;background:var(--strawberry);border-radius:50%;opacity:.85}
.gummy-eyes{position:absolute;top:32%;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.gummy-eye{width:4px;height:3px;background:rgba(0,0,0,0.4);border-radius:50%}
.gummy-label{font-size:8px;text-align:center;color:var(--strawberry);margin-top:2px}

/* cupcake enemy */
.cupcake{position:absolute;z-index:9;animation:cupbounce 2s ease-in-out infinite}
@keyframes cupbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.cupcake-body{width:32px;height:36px;position:relative}
.cupcake-wrapper{width:28px;height:18px;background:linear-gradient(180deg,var(--caramel),#F57C00);border-radius:0 0 8px 8px;position:absolute;bottom:0;left:2px;border:2px solid #E65100}
.cupcake-frosting{width:32px;height:20px;background:linear-gradient(135deg,var(--strawberry),#EC407A);border-radius:50% 50% 20% 20%;position:absolute;bottom:14px;box-shadow:0 2px 4px rgba(194,24,91,0.15)}
.cupcake-cherry{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#D32F2F;border-radius:50%;box-shadow:0 1px 3px rgba(211,47,47,0.3)}
.cupcake-eyes{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.cupcake-eye{width:4px;height:4px;background:#fff;border-radius:50%}
.cupcake-eye::after{content:'';position:absolute;bottom:0;left:0;width:3px;height:3px;background:#333;border-radius:50%}

/* wedding cake boss */
.wedding-cake{position:absolute;z-index:9;animation:cakewobble 1.5s ease-in-out infinite}
@keyframes cakewobble{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.wc-body{width:70px;position:relative;text-align:center}
.wc-tier{background:linear-gradient(180deg,#fff,#FFECB3);border-radius:4px;margin:0 auto;border:2px solid #FFE082;position:relative}
.wc-tier-1{width:30px;height:16px}
.wc-tier-2{width:48px;height:18px;margin-top:-2px}
.wc-tier-3{width:66px;height:20px;margin-top:-2px}
.wc-frosting{position:absolute;bottom:100%;left:-2px;right:-2px;height:4px;background:var(--strawberry);border-radius:3px}
.wc-top{width:8px;height:12px;background:linear-gradient(180deg,#FFD54F,#FFC107);margin:0 auto;margin-top:-2px;border-radius:2px 2px 0 0;position:relative}
.wc-top::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:4px;height:6px;background:radial-gradient(ellipse,#FFD54F,#FF6F00);border-radius:50% 50% 50% 50%/60% 60% 40% 40%}
.wc-eyes{position:absolute;top:4px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.wc-eye{width:5px;height:5px;background:#333;border-radius:50%}

/* rolling donut */
.donut{position:absolute;z-index:8;animation:donutroll 3s linear infinite}
@keyframes donutroll{0%{transform:translateX(0) rotate(0)}100%{transform:translateX(60px) rotate(360deg)}}
.donut-body{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FFCC80,var(--caramel));border:6px solid var(--caramel);box-shadow:0 2px 6px rgba(245,124,0,0.2);position:relative}
.donut-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#fff;border-radius:50%}

/* sugar rush meter */
.sugar-meter{position:absolute;top:8px;right:8px;width:60px;height:10px;background:rgba(93,64,55,0.1);border-radius:5px;z-index:15;overflow:hidden;border:1px solid rgba(93,64,55,0.15)}
.sugar-fill{width:80%;height:100%;background:linear-gradient(90deg,#FF6F00,var(--strawberry),#7B1FA2,#2196F3,var(--mint));background-size:200% 100%;animation:rainbow 2s linear infinite;border-radius:5px}
@keyframes rainbow{0%{background-position:0 0}100%{background-position:200% 0}}

.hint-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--dark);opacity:.2;pointer-events:none;text-align:center;line-height:1.8;z-index:1}
.finger-dot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid rgba(255,183,77,0.4);background:rgba(255,183,77,0.15);z-index:20;animation:fpulse 1.5s ease-in-out infinite}
@keyframes fpulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:.3}}
.game-footer{padding:10px 16px 22px;display:flex;justify-content:center;flex-shrink:0}
.reset-btn{font-family:inherit;font-size:14px;color:var(--dark);background:#fff;border:3px solid #ffe0b2;border-radius:14px;padding:10px 28px;cursor:pointer;box-shadow:0 3px 0 #ffe0b2}
.reset-btn:active{transform:translateY(2px)}

.clear-screen{align-items:center;justify-content:center;gap:22px}
.clear-text{font-size:48px;color:var(--choco);letter-spacing:5px}
.clear-stars{display:flex;gap:10px}
.clear-star{width:52px;height:52px;animation:starspin 1.5s ease-in-out infinite}
.clear-star:nth-child(2){animation-delay:.15s}
.clear-star:nth-child(3){animation-delay:.3s}
@keyframes starspin{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(10deg) scale(1.1)}75%{transform:rotate(-10deg) scale(1.05)}}
.clear-star svg{width:100%;height:100%;filter:drop-shadow(0 3px 8px rgba(255,200,0,0.4))}
.clear-msg{font-size:16px;color:var(--dark);opacity:.5}
.clear-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.next-btn{font-family:inherit;font-size:20px;color:#fff;background:linear-gradient(135deg,var(--strawberry),#C2185B);border:none;border-radius:18px;padding:14px 0;box-shadow:0 4px 0 #AD1457;cursor:pointer;letter-spacing:3px}
.next-btn:active{transform:translateY(3px)}
.retry-btn{font-family:inherit;font-size:14px;color:var(--dark);background:#fff;border:3px solid #ffe0b2;border-radius:14px;padding:12px 0;cursor:pointer;box-shadow:0 3px 0 #ffe0b2}
.retry-btn:active{transform:translateY(2px)}
</style>
</head>
<body>
<nav class="tab-nav">
  <button class="tab-btn active" data-screen="title">タイトル</button>
  <button class="tab-btn" data-screen="lv1">Lv.1</button>
  <button class="tab-btn" data-screen="lv5">Lv.5</button>
  <button class="tab-btn" data-screen="lv10">Lv.10</button>
  <button class="tab-btn" data-screen="lv15">Lv.15</button>
  <button class="tab-btn" data-screen="lv20">Lv.20</button>
  <button class="tab-btn" data-screen="clear">クリア</button>
</nav>

<section class="screen title-screen sweets-bg active" id="screen-title">
  <div class="title-marble-wrap"><div class="marble-caramel"></div></div>
  <div class="title-text"><h1>ビー玉<br>ころころ</h1><p>おかしの くにへ ようこそ！</p></div>
  <button class="play-btn">あそぶ</button>
</section>

<section class="screen game-screen sweets-bg" id="screen-lv1">
  <div class="game-header"><div class="level-badge">レベル 1</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area"><div class="goal-zone"><div class="cake"><div class="cake-flame"></div><div class="cake-candle"></div><div class="cake-top"></div><div class="cake-frosting"></div><div class="cake-base"></div></div><div class="goal-label">ゴール</div></div><div class="hint-label">ゆびで なぞって<br>みちを つくろう</div><div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/><path class="path-line" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/></svg></div><div class="finger-dot" style="bottom:22%;left:42%"></div><div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div><div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div></div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen sweets-bg" id="screen-lv5">
  <div class="game-header"><div class="level-badge">レベル 5</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area"><div class="goal-zone"><div class="cake"><div class="cake-flame"></div><div class="cake-candle"></div><div class="cake-top"></div><div class="cake-frosting"></div><div class="cake-base"></div></div><div class="goal-label">ゴール</div></div><div class="choco-block" style="top:30%;left:8%;width:65px;height:24px"></div><div class="cookie" style="top:50%;right:8%;width:75px;height:24px"></div><div class="choco-block" style="top:38%;left:52%;width:12px;height:48px"></div><div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/><path class="path-line" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/></svg></div><div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div><div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div></div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen sweets-bg" id="screen-lv10">
  <div class="game-header"><div class="level-badge">レベル 10</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area"><div class="goal-zone"><div class="cake"><div class="cake-flame"></div><div class="cake-candle"></div><div class="cake-top"></div><div class="cake-frosting"></div><div class="cake-base"></div></div><div class="goal-label">ゴール</div></div><div class="choco-block" style="top:22%;left:5%;width:48px;height:20px"></div><div class="choco-block" style="top:22%;right:5%;width:48px;height:20px"></div><div class="cookie" style="top:68%;left:28%;width:80px;height:20px"></div><div class="donut" style="top:40%;left:10%"><div class="donut-body"><div class="donut-hole"></div></div></div><div class="gummy" style="top:52%;right:14%"><div class="gummy-body"><div class="gummy-ears"><div class="gummy-ear"></div><div class="gummy-ear"></div></div><div class="gummy-eyes"><div class="gummy-eye"></div><div class="gummy-eye"></div></div></div><div class="gummy-label">グミ！</div></div><div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,430 C170,410 130,400 110,380 C80,350 70,320 100,290 C130,260 200,270 230,250 C260,230 270,200 240,180 C210,160 170,170 140,160 C110,150 100,130 120,110 C140,90 170,85 170,80"/><path class="path-line" d="M170,430 C170,410 130,400 110,380 C80,350 70,320 100,290 C130,260 200,270 230,250 C260,230 270,200 240,180 C210,160 170,170 140,160 C110,150 100,130 120,110 C140,90 170,85 170,80"/></svg></div><div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div><div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div></div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
