<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ビー玉ころころ - さくらのくに</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sakura:#FFB7C5;--blossom:#FFF0F5;--branch:#8D6E63;--sky:#87CEEB;--gold:#DAA520;--dark:#4a3030;--shadow:0 4px 16px rgba(74,48,48,0.1)}
html,body{font-family:'Zen Antique Soft',serif;background:var(--blossom);color:var(--dark);overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab-nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;background:rgba(255,240,245,0.92);backdrop-filter:blur(12px);border-bottom:2px solid var(--sakura);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 12px;font-family:inherit;font-size:11px;border:none;background:none;color:var(--dark);cursor:pointer;white-space:nowrap;position:relative}
.tab-btn.active{color:#d4618c}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:#d4618c;border-radius:2px 2px 0 0}
.screen{display:none;min-height:100vh;min-height:100dvh;padding-top:44px}
.screen.active{display:flex;flex-direction:column}

.sakura-bg{background:linear-gradient(180deg,var(--sky) 0%,#b3e0f2 30%,var(--blossom) 60%,#fff5f8 100%);position:relative;overflow:hidden}

/* falling petals */
.petal{position:absolute;width:10px;height:8px;background:var(--sakura);border-radius:50% 0 50% 50%;opacity:.6;animation:petalfall var(--dur,6s) linear infinite var(--delay,0s);z-index:0}
@keyframes petalfall{0%{transform:translateY(-20px) translateX(0) rotate(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(100vh) translateX(50px) rotate(360deg);opacity:0}}

.title-screen{align-items:center;justify-content:center;gap:28px}
.title-marble-wrap{width:110px;height:110px;animation:bounce 2s ease-in-out infinite;position:relative}
.title-marble-wrap::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:70px;height:14px;background:radial-gradient(ellipse,rgba(74,48,48,0.12) 0%,transparent 70%);border-radius:50%}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-36px)}50%{transform:translateY(0)}60%{transform:translateY(-10px)}75%{transform:translateY(0)}}

.marble-rose{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.9) 0%,transparent 40%),radial-gradient(circle at 65% 70%,rgba(200,120,140,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#f8c0d0 0%,#e8a0b8 40%,#d080a0 70%,#b06080 100%);box-shadow:inset -6px -6px 16px rgba(0,0,0,0.1),inset 3px 3px 8px rgba(255,255,255,0.3),0 6px 24px rgba(200,100,140,0.25);position:relative}
.marble-rose::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(2px)}

.title-text h1{font-size:34px;text-align:center;color:#d4618c;line-height:1.3}
.title-text p{font-size:13px;color:var(--dark);opacity:.5;text-align:center;margin-top:4px}
.play-btn{font-family:inherit;font-size:24px;color:#fff;background:linear-gradient(135deg,var(--sakura),#e8a0b8);border:none;border-radius:50px;padding:16px 56px;box-shadow:0 5px 0 #c080a0,0 7px 20px rgba(200,128,160,0.2);cursor:pointer;letter-spacing:3px}
.play-btn:active{transform:translateY(3px)}

.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0}
.level-badge{background:rgba(255,255,255,0.9);border-radius:20px;padding:5px 16px;font-size:15px;box-shadow:var(--shadow);color:var(--dark)}
.stars{display:flex;gap:3px}
.star svg{width:26px;height:26px}
.star-empty{fill:#f0d8e0}
.star-filled{fill:#FFD93D;filter:drop-shadow(0 1px 2px rgba(255,200,0,0.4))}
.game-area{flex:1;margin:6px 14px;background:rgba(255,255,255,0.85);border-radius:22px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:0}
.game-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,183,197,0.05) 1px,transparent 1px);background-size:22px 22px}

/* maneki-neko goal */
.goal-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center}
.neko{width:50px;height:50px;margin:0 auto;position:relative}
.neko-body{width:42px;height:38px;background:linear-gradient(135deg,#fff,#f0e0d0);border-radius:40% 40% 50% 50%;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);border:2px solid #e8d0c0;position:relative}
.neko-ear{position:absolute;top:-6px;width:12px;height:12px;background:#fff;border-radius:50% 50% 0 0;border:2px solid #e8d0c0}
.neko-ear:first-child{left:4px;transform:rotate(-15deg)}
.neko-ear:last-child{right:4px;transform:rotate(15deg)}
.neko-ear::after{content:'';position:absolute;inset:2px;background:var(--sakura);border-radius:inherit}
.neko-eyes{position:absolute;top:35%;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.neko-eye{width:4px;height:2px;background:#333;border-radius:0 0 4px 4px}
.neko-nose{position:absolute;top:48%;left:50%;transform:translateX(-50%);width:4px;height:3px;background:var(--sakura);border-radius:50%}
.neko-paw{position:absolute;top:8px;right:-8px;width:10px;height:16px;background:#fff;border-radius:8px;border:2px solid #e8d0c0;animation:wave 1s ease-in-out infinite;transform-origin:bottom center}
@keyframes wave{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.goal-label{font-size:10px;color:var(--dark);margin-top:4px;opacity:.5;letter-spacing:2px}

.start-zone{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);text-align:center}
.start-platform{width:76px;height:18px;background:linear-gradient(135deg,var(--sakura),#e8a0b8);border-radius:12px;margin:0 auto;box-shadow:0 3px 0 #c080a0}
.start-label{font-size:10px;color:var(--dark);margin-top:6px;opacity:.5;letter-spacing:2px}

.gm{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.9) 0%,transparent 40%),radial-gradient(circle at 65% 70%,rgba(200,120,140,0.4) 0%,transparent 50%),radial-gradient(circle at 50% 50%,#f8c0d0 0%,#e8a0b8 40%,#d080a0 70%,#b06080 100%);box-shadow:inset -3px -3px 8px rgba(0,0,0,0.1),inset 2px 2px 4px rgba(255,255,255,0.3),0 3px 10px rgba(200,100,140,0.2);position:absolute;z-index:10}
.gm::after{content:'';position:absolute;top:18%;left:25%;width:28%;height:20%;background:rgba(255,255,255,0.7);border-radius:50%;transform:rotate(-30deg);filter:blur(1px)}

.drawn-path{position:absolute;inset:0;z-index:5}
.drawn-path svg{width:100%;height:100%}
.path-line{fill:none;stroke:var(--sakura);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;opacity:.5}
.path-border{fill:none;stroke:rgba(255,183,197,0.2);stroke-width:18;stroke-linecap:round;stroke-linejoin:round}

/* stone lantern obstacle */
.lantern{position:absolute;z-index:8}
.lantern-body{border-radius:6px;background:linear-gradient(135deg,#BDBDBD,#9E9E9E);box-shadow:0 3px 0 #757575;border:2px solid #9E9E9E}
/* wooden bridge */
.bridge{position:absolute;z-index:8;border-radius:4px;background:repeating-linear-gradient(90deg,var(--branch) 0px,var(--branch) 8px,#a1887f 8px,#a1887f 10px);box-shadow:0 3px 0 #5D4037;border:2px solid #6D4C41}

/* tanuki enemy */
.tanuki{position:absolute;z-index:9;animation:tanukiwalk 3s ease-in-out infinite}
@keyframes tanukiwalk{0%,100%{transform:translateX(0)}50%{transform:translateX(15px)}}
.tanuki-body{width:34px;height:30px;background:linear-gradient(135deg,var(--branch),#6D4C41);border-radius:50% 50% 40% 40%;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.tanuki-belly{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:18px;height:12px;background:#FFCC80;border-radius:50%}
.tanuki-eyes{position:absolute;top:28%;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.tanuki-eye{width:8px;height:6px;background:#333;border-radius:50%;border:1px solid #555}
.tanuki-nose{position:absolute;top:50%;left:50%;transform:translateX(-50%);width:5px;height:4px;background:#333;border-radius:50%}
.tanuki-label{font-size:8px;text-align:center;color:var(--branch);margin-top:2px}

/* kitsune enemy */
.kitsune{position:absolute;z-index:9;animation:kitfloat 2s ease-in-out infinite}
@keyframes kitfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.kitsune-body{width:32px;height:30px;background:linear-gradient(135deg,#FFB74D,#FFA726);border-radius:40% 40% 50% 50%;position:relative;box-shadow:0 2px 6px rgba(255,167,38,0.2)}
.kitsune-ear{position:absolute;top:-8px;width:10px;height:12px;background:#FFB74D;clip-path:polygon(50% 0%,0% 100%,100% 100%)}
.kitsune-ear:first-child{left:2px}
.kitsune-ear:last-child{right:2px}
.kitsune-eyes{position:absolute;top:35%;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.kitsune-eye{width:5px;height:3px;background:#333;border-radius:0 0 4px 4px}

/* dragon boss */
.dragon{position:absolute;z-index:9;animation:dragonfly 2s ease-in-out infinite}
@keyframes dragonfly{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-8px) scaleX(1.02)}}
.dragon-body{display:flex;align-items:center;gap:0}
.dragon-head{width:36px;height:32px;background:linear-gradient(135deg,#E53935,#C62828);border-radius:50% 60% 50% 40%;position:relative;box-shadow:0 3px 8px rgba(198,40,40,0.3);z-index:2}
.dragon-horn{position:absolute;top:-6px;width:6px;height:10px;background:var(--gold);clip-path:polygon(50% 0%,0% 100%,100% 100%)}
.dragon-horn:first-child{left:6px;transform:rotate(-10deg)}
.dragon-horn:last-child{right:6px;transform:rotate(10deg)}
.dragon-eye{position:absolute;top:30%;width:8px;height:6px;background:#FFD54F;border-radius:50%;left:20%}
.dragon-eye::after{content:'';position:absolute;top:1px;left:3px;width:3px;height:4px;background:#1a1a1a;border-radius:50%}
.dragon-seg{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#EF5350,#E53935);margin-left:-6px;animation:segwave var(--d,1s) ease-in-out infinite var(--dl,0s)}
@keyframes segwave{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* shoji (sliding door) obstacle */
.shoji{position:absolute;z-index:8;animation:shojiSlide 4s ease-in-out infinite}
@keyframes shojiSlide{0%,100%{transform:translateX(0)}50%{transform:translateX(40px)}}
.shoji-body{border-radius:4px;background:linear-gradient(180deg,#fff 0%,#f5f0e8 100%);box-shadow:0 2px 6px rgba(0,0,0,0.1);border:2px solid #d4c4a8;position:relative}
.shoji-body::before{content:'';position:absolute;inset:3px;border:1px solid rgba(141,110,99,0.2);border-radius:2px}

.hint-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--dark);opacity:.2;pointer-events:none;text-align:center;line-height:1.8;z-index:1}
.finger-dot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid rgba(255,183,197,0.5);background:rgba(255,183,197,0.2);z-index:20;animation:fpulse 1.5s ease-in-out infinite}
@keyframes fpulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:.3}}
.game-footer{padding:10px 16px 22px;display:flex;justify-content:center;flex-shrink:0}
.reset-btn{font-family:inherit;font-size:14px;color:var(--dark);background:rgba(255,255,255,0.9);border:2px solid #f0d0d8;border-radius:14px;padding:10px 28px;cursor:pointer;box-shadow:0 3px 0 #f0d0d8}
.reset-btn:active{transform:translateY(2px)}
.hurry{position:absolute;top:8px;right:8px;background:rgba(212,97,140,0.15);border-radius:12px;padding:4px 10px;font-size:10px;color:#d4618c;animation:hpulse 1s ease-in-out infinite;z-index:15}
@keyframes hpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}

.clear-screen{align-items:center;justify-content:center;gap:22px}
.clear-text{font-size:48px;color:#d4618c;letter-spacing:5px}
.clear-stars{display:flex;gap:10px}
.clear-star{width:52px;height:52px;animation:starspin 1.5s ease-in-out infinite}
.clear-star:nth-child(2){animation-delay:.15s}
.clear-star:nth-child(3){animation-delay:.3s}
@keyframes starspin{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(10deg) scale(1.1)}75%{transform:rotate(-10deg) scale(1.05)}}
.clear-star svg{width:100%;height:100%;filter:drop-shadow(0 3px 8px rgba(255,200,0,0.4))}
.clear-msg{font-size:16px;color:var(--dark);opacity:.5}
.clear-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.next-btn{font-family:inherit;font-size:20px;color:#fff;background:linear-gradient(135deg,var(--sakura),#d080a0);border:none;border-radius:18px;padding:14px 0;box-shadow:0 4px 0 #b06080;cursor:pointer;letter-spacing:3px}
.next-btn:active{transform:translateY(3px)}
.retry-btn{font-family:inherit;font-size:14px;color:var(--dark);background:rgba(255,255,255,0.9);border:2px solid #f0d0d8;border-radius:14px;padding:12px 0;cursor:pointer;box-shadow:0 3px 0 #f0d0d8}
.retry-btn:active{transform:translateY(2px)}
</style>
</head>
<body>
<nav class="tab-nav">
  <button class="tab-btn active" data-screen="title">タイトル</button>
  <button class="tab-btn" data-screen="lv1">Lv.1</button>
  <button class="tab-btn" data-screen="lv5">Lv.5</button>
  <button class="tab-btn" data-screen="lv10">Lv.10</button>
  <button class="tab-btn" data-screen="lv15">Lv.15</button>
  <button class="tab-btn" data-screen="lv20">Lv.20</button>
  <button class="tab-btn" data-screen="clear">クリア</button>
</nav>

<section class="screen title-screen sakura-bg active" id="screen-title">
  <div class="petal" style="left:10%;--dur:5s;--delay:0s"></div><div class="petal" style="left:30%;--dur:7s;--delay:1s"></div><div class="petal" style="left:55%;--dur:6s;--delay:.5s"></div><div class="petal" style="left:75%;--dur:4.5s;--delay:2s"></div><div class="petal" style="left:90%;--dur:5.5s;--delay:1.5s"></div>
  <div class="title-marble-wrap"><div class="marble-rose"></div></div>
  <div class="title-text"><h1>ビー玉<br>ころころ</h1><p>さくらの くにを たびしよう</p></div>
  <button class="play-btn">あそぶ</button>
</section>

<section class="screen game-screen sakura-bg" id="screen-lv1">
  <div class="petal" style="left:20%;--dur:6s;--delay:0s"></div><div class="petal" style="left:70%;--dur:5s;--delay:1s"></div>
  <div class="game-header"><div class="level-badge">レベル 1</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="neko"><div class="neko-body"><div class="neko-ear" style="left:4px"></div><div class="neko-ear" style="right:4px"></div><div class="neko-eyes"><div class="neko-eye"></div><div class="neko-eye"></div></div><div class="neko-nose"></div><div class="neko-paw"></div></div></div><div class="goal-label">ゴール</div></div>
    <div class="hint-label">ゆびで なぞって<br>みちを つくろう</div>
    <div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/><path class="path-line" d="M170,420 C170,380 140,340 160,300 C180,260 190,220 170,180 C155,150 170,110 170,90"/></svg></div>
    <div class="finger-dot" style="bottom:22%;left:42%"></div>
    <div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div>
    <div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div>
  </div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen sakura-bg" id="screen-lv5">
  <div class="game-header"><div class="level-badge">レベル 5</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="neko"><div class="neko-body"><div class="neko-ear" style="left:4px"></div><div class="neko-ear" style="right:4px"></div><div class="neko-eyes"><div class="neko-eye"></div><div class="neko-eye"></div></div><div class="neko-nose"></div><div class="neko-paw"></div></div></div><div class="goal-label">ゴール</div></div>
    <div class="lantern"><div class="lantern-body" style="position:absolute;top:30%;left:8%;width:70px;height:26px;border-radius:6px"></div></div>
    <div class="bridge" style="position:absolute;top:50%;right:8%;width:80px;height:16px"></div>
    <div class="lantern"><div class="lantern-body" style="position:absolute;top:38%;left:52%;width:14px;height:55px;border-radius:6px"></div></div>
    <div class="drawn-path"><svg viewBox="0 0 340 500" preserveAspectRatio="none"><path class="path-border" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/><path class="path-line" d="M170,420 C170,390 220,370 240,340 C260,310 260,280 220,260 C180,240 100,240 80,210 C60,180 100,150 140,130 C170,115 170,95 170,85"/></svg></div>
    <div class="gm" style="bottom:22px;left:calc(50% - 17px)"></div>
    <div class="start-zone"><div class="start-platform"></div><div class="start-label">スタート</div></div>
  </div>
  <div class="game-footer"><button class="reset-btn">リセット</button></div>
</section>

<section class="screen game-screen sakura-bg" id="screen-lv10">
  <div class="game-header"><div class="level-badge">レベル 10</div><div class="stars"><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div><div class="star"><svg viewBox="0 0 24 24"><polygon class="star-empty" points="12,2 15.1,8.3 22,9.2 17,14.1 18.2,21 12,17.7 5.8,21 7,14.1 2,9.2 8.9,8.3"/></svg></div></div></div>
  <div class="game-area">
    <div class="goal-zone"><div class="neko"><div class="neko-body"><div class="neko-ear" style="left:4px"></div><div class="neko-ear" style="right:4px"></div><div class="neko-eyes"><div class="neko-eye"></div><div class="neko-eye"></div></div><div class="neko-nose"></div><div class="neko-paw"></div></div></div><div class="goal-label">ゴール</div></div>
    <div class="lantern"><div class="lantern-body" style="position:absolute;top:22%;left:5%;width:50px;height:22px;border-radius:6px"></div></div>
    <div class="lantern"><div class="lantern-body" style="position:absolute;top:22%;right:5%;width:50px;height:22px;border-radius:6px"></div></div>
    <div class="bridge" style="position:absolute;top:68%;left:28%;width:90px;height:14px"></div>
